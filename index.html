// Capacitor recharge: dC/dt = (2*Cmax/tau) * (sqrt(C/Cmax) - C/Cmax), tau = rechargeTime/5
// Peak recharge occurs at 25% capacity.
function rechargeRate(cur, max, rechargeS) {
  if (max <= 0 || rechargeS <= 0) return 0;
  const tau = rechargeS / 5;
  const f = Math.max(0, Math.min(1, cur / max));
  return 2 * max / tau * (Math.sqrt(f) - f);
}

function parseEFT(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim());
  let ship = null,
    fitName = "Imported fit";
  const rack = [],
    passive = [],
    ignored = [],
    estimated = [];
  const resistMods = {
    shield: [],
    armor: [],
    hull: []
  };
  const battery = {
    capAdd: 0,
    resist: 0
  };
  let cargoCharges = 0;
  const nameCount = {};
  for (const raw of lines) {
    if (!raw) continue;
    const h = /^\[([^,\]]+)(?:,\s*(.*?))?\]$/.exec(raw);
    if (h) {
      if (/^empty\b/i.test(h[1])) continue;
      ship = h[1].trim();
      fitName = (h[2] || ship).trim();
      continue;
    }
    const qm = /^(.*?)\s+x(\d+)$/i.exec(raw);
    if (qm) {
      if (qm[1].toLowerCase().includes("cap booster")) {
        cargoCharges += parseInt(qm[2], 10);
        passive.push(`${raw} \u2192 loaded into cargo hold`);
      } else ignored.push(raw + " \u2014 cargo/charges");
      continue;
    }
    const low = raw.toLowerCase();
    const e = sdeLookup(raw);
    if (e) {
      const k = e.k;
      if (e.res) {
        const layers = k === "dcu" ? ["shield", "armor", "hull"] : [e.lay];
        layers.forEach(L => {
          if (L) resistMods[L].push(e.res);
        });
      }
      if (k === "capBattery") {
        battery.capAdd += Math.round(e.capBonus || 0);
        battery.resist = Math.max(battery.resist, low.includes(" ii") ? 0.25 : 0.20);
        passive.push(`${raw} \u2192 +${fmt(Math.round(e.capBonus || 0))} GJ capacity`);
        continue;
      }
      if (k === "rig" || k === "resamp" || k === "dcu") {
        passive.push(`${raw} \u2192 resist applied to tank`);
        continue;
      }
      const m = sdeToRackMod(raw, e);
      if (m) {
        nameCount[raw] = (nameCount[raw] || 0) + 1;
        m.name = nameCount[raw] > 1 ? `${raw} #${nameCount[raw]}` : raw;
        rack.push(m);
      } else passive.push(raw);
      continue;
    }
    if (PASSIVE_RE.test(low)) {
      passive.push(raw);
      continue;
    }
    let mod = guessModule(raw);
    if (mod) {
      nameCount[raw] = (nameCount[raw] || 0) + 1;
      mod.name = nameCount[raw] > 1 ? `${raw} #${nameCount[raw]}` : raw;
      rack.push(mod);
      estimated.push(mod.name);
    } else ignored.push(raw);
  }
  return {
    ship,
    fitName,
    rack,
    passive,
    ignored,
    estimated,
    battery,
    cargoCharges,
    resistMods
  };
}

function makeStaggeredNeuts(gjs, n = 6, cycleS = 12, startS = 6) {
  gjs = Math.max(0, gjs || 0);
  const perCycle = Math.round(gjs / n * cycleS);
  const step = cycleS / n;
  const out = [];
  for (let i = 0; i < n; i++) {
    let s = startS + i * step;
    s = Number.isInteger(s) ? s : +s.toFixed(2);
    out.push({
      label: `Neut ${i + 1}`,
      amount: perCycle,
      cycleS,
      startS: s,
      count: 1
    });
  }
  return out;
}
